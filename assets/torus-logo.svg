<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TORUS Open Building Data OS 構想書 v0.1</title>
<style>
  :root{
    --navy:#0c2340;
    --blue:#1f4b99;
    --line:#d7dee8;
    --text:#1b2430;
    --muted:#5d6b7a;
    --bg:#f5f7fa;
    --card:#ffffff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.7;
  }
  .wrap{
    max-width:1080px;
    margin:0 auto;
    padding:32px 20px 56px;
  }
  .hero{
    background:var(--navy);
    color:#fff;
    padding:40px 32px 34px;
    border-radius:18px;
    box-shadow:0 10px 28px rgba(12,35,64,.14);
  }
  .eyebrow{
    display:inline-block;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    padding:6px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  h1{
    margin:0 0 12px;
    font-size:34px;
    line-height:1.35;
    font-weight:800;
  }
  .lead{
    font-size:16px;
    opacity:.96;
    margin:0;
  }
  .meta{
    margin-top:18px;
    font-size:13px;
    opacity:.82;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:22px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:24px 24px 20px;
  }
  h2{
    font-size:24px;
    color:var(--navy);
    margin:0 0 14px;
    line-height:1.4;
  }
  h3{
    font-size:18px;
    color:var(--navy);
    margin:0 0 10px;
    line-height:1.45;
  }
  p{margin:0 0 12px}
  .small{font-size:13px;color:var(--muted)}
  .muted{color:var(--muted)}
  .section{
    margin-top:22px;
  }
  .full{
    grid-column:1 / -1;
  }
  .problem-list,
  .benefit-list,
  .phase-list,
  .layer-list{
    display:grid;
    gap:12px;
    margin:14px 0 0;
  }
  .item{
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    background:#fff;
  }
  .item strong{
    color:var(--navy);
  }
  table{
    width:100%;
    border-collapse:collapse;
    margin-top:12px;
    font-size:14px;
    background:#fff;
  }
  th,td{
    border:1px solid var(--line);
    padding:10px 11px;
    vertical-align:top;
    text-align:left;
  }
  th{
    background:#eef3f8;
    color:var(--navy);
    font-weight:700;
  }
  code, .code{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    background:#f2f5f8;
    border:1px solid #e2e8f0;
    border-radius:8px;
    padding:2px 6px;
    font-size:13px;
  }
  .band{
    background:#edf4ff;
    border:1px solid #d7e5ff;
    border-radius:14px;
    padding:18px 20px;
  }
  .quote{
    border-left:4px solid var(--blue);
    padding-left:14px;
    color:var(--muted);
    margin-top:10px;
  }
  .footer{
    margin-top:28px;
    color:var(--muted);
    font-size:13px;
    text-align:center;
  }
  .pill{
    display:inline-block;
    margin:4px 6px 0 0;
    padding:5px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    background:#fff;
    font-size:13px;
    color:var(--navy);
  }
  @media (max-width:820px){
    .grid{grid-template-columns:1fr}
    h1{font-size:28px}
    .hero{padding:30px 22px}
    .card{padding:20px 18px}
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">TORUS Concept Note</div>
      <h1>日本のブラックボックス化されたBMSを、<br>オープンな建築設備データ基盤へ。</h1>
      <p class="lead">
        本資料は、現行BMS業態の閉鎖性を前提とした建物運用から脱却し、
        建築ストックのエネルギーDB化・設備効率改善・投資判断高度化へつなげる
        <strong>TORUS Open Building Data OS</strong> 構想の共有用ドキュメントです。
      </p>
      <div class="meta">対象読者：チーム内共有 / NWC / 不動産保有者 / 公共施設運営者 / BMS見直し検討者</div>
    </section>

    <div class="grid">
      <section class="card full">
        <h2>1. 背景認識</h2>
        <p>
          日本の多くの建物では、中央監視・BMS・各種サブシステムがベンダーごとに独自設計され、
          設備データの意味・命名・接続方法・保管構造が統一されていません。
          その結果、建物には大量のデータが存在するにもかかわらず、
          <strong>エネルギーDBとして使えない / 設備効率改善に繋がらない / CAPEX・OPEX判断に活かせない</strong>
          という状態が常態化しています。
        </p>
        <div class="problem-list">
          <div class="item"><strong>問題1｜データはあるが意味がない</strong><br>AI01、Temp1、T01 のようなポイント名だけでは、何の設備の何の値かが読み解けません。</div>
          <div class="item"><strong>問題2｜ベンダーロックが強い</strong><br>データ閲覧・変更・増設・解析が特定BMS業者に依存し、建物保有者側にデータ主権がありません。</div>
          <div class="item"><strong>問題3｜建物横断の比較ができない</strong><br>物件ごとに命名も構成も違うため、複数建物の設備効率比較やポートフォリオ分析に進めません。</div>
          <div class="item"><strong>問題4｜改善投資の根拠が弱い</strong><br>設備更新・制御改修・省エネ投資の妥当性を、実測データで継続的に示しにくい構造です。</div>
        </div>
      </section>

      <section class="card">
        <h2>2. TORUSが目指す状態</h2>
        <p>
          TORUSは、既存BMSをすぐに全否定して置換するのではなく、
          まずは <strong>設備データをオープンな共通構造で管理できる上位OS</strong> を整備し、
          建物保有者・運営者・設計者・施工者・保守者が同じ座標系で会話できる状態をつくります。
        </p>
        <div class="quote">
          BMS = ブラックボックスな完成品 ではなく、<br>
          BMS = 1つの接続先 / TORUS = 建物全体のオープンOS という構造へ。
        </div>
      </section>

      <section class="card">
        <h2>3. 基本方針</h2>
        <div>
          <span class="pill">Open Protocol</span>
          <span class="pill">Open Tag</span>
          <span class="pill">Open DB</span>
          <span class="pill">Open Review</span>
          <span class="pill">Building Data Ownership</span>
        </div>
        <p class="section">
          TORUSは、設備・通信・建物・投資判断までをつなぐために、
          <strong>「誰でも読める」「設備の意味が残る」「CSVでもDBでも同じ構造で扱える」</strong>
          ことを最優先にします。
        </p>
      </section>

      <section class="card full">
        <h2>4. TORUS通信・データ標準 v1.0 の骨格</h2>

        <h3>4-1. Device ID体系</h3>
        <p>設備を世界で一意に識別するためのルールです。設備台帳・BIM・DB・AI診断の接続キーになります。</p>
        <div class="band">
          <div><span class="code">COUNTRY-CITY-SITE-AREA-TYPE-NO</span></div>
          <div class="section"><span class="code">JP-TYO-VILLA01-F2-AHU-01</span></div>
        </div>
        <table>
          <thead>
            <tr><th>項目</th><th>内容</th></tr>
          </thead>
          <tbody>
            <tr><td>JP</td><td>国</td></tr>
            <tr><td>TYO</td><td>都市</td></tr>
            <tr><td>VILLA01</td><td>建物 / サイト</td></tr>
            <tr><td>F2</td><td>階・エリア</td></tr>
            <tr><td>AHU</td><td>設備タイプ</td></tr>
            <tr><td>01</td><td>連番</td></tr>
          </tbody>
        </table>

        <h3 class="section">4-2. Equipment Type Dictionary</h3>
        <p>
          Tag辞書の前に、まず設備の種類を共通定義します。これにより、設備ごとに持つべきタグや評価指標が定まります。
        </p>
        <table>
          <thead>
            <tr><th>equipment_type</th><th>名称</th><th>主な用途</th></tr>
          </thead>
          <tbody>
            <tr><td>AHU</td><td>Air Handling Unit</td><td>空調機</td></tr>
            <tr><td>FCU</td><td>Fan Coil Unit</td><td>ファンコイル</td></tr>
            <tr><td>CH</td><td>Chiller</td><td>冷凍機</td></tr>
            <tr><td>CHWP</td><td>Chilled Water Pump</td><td>冷水ポンプ</td></tr>
            <tr><td>CT</td><td>Cooling Tower</td><td>冷却塔</td></tr>
            <tr><td>PANEL</td><td>Electrical Panel</td><td>分電盤・配電盤</td></tr>
            <tr><td>W_PUMP</td><td>Water Pump</td><td>給水・排水ポンプ</td></tr>
          </tbody>
        </table>

        <h3 class="section">4-3. Tag Standard</h3>
        <p>
          設備データの意味を共通語に変換するためのタグ標準です。
          これにより <span class="code">Temp1</span> / <span class="code">T01</span> / <span class="code">SA Temp</span> のような表記揺れを解消します。
        </p>
        <table>
          <thead>
            <tr><th>tag</th><th>意味</th><th>例</th></tr>
          </thead>
          <tbody>
            <tr><td>SAT</td><td>送風温度</td><td>AHU, FCU</td></tr>
            <tr><td>RAT</td><td>還気温度</td><td>AHU</td></tr>
            <tr><td>DAT</td><td>吐出温度</td><td>AHU, FCU</td></tr>
            <tr><td>CWS</td><td>冷水往温度</td><td>CH, HEX</td></tr>
            <tr><td>CWR</td><td>冷水還温度</td><td>CH, HEX</td></tr>
            <tr><td>FLOW</td><td>流量</td><td>PUMP, WATER</td></tr>
            <tr><td>PWR</td><td>消費電力</td><td>ALL</td></tr>
            <tr><td>RUN</td><td>運転状態</td><td>ALL</td></tr>
          </tbody>
        </table>

        <h3 class="section">4-4. Modbus / Open Mapping</h3>
        <p>
          設備、タグ、通信アドレスの対応関係をCSVまたはDBで管理します。
          中央監視だけが知っている状態をやめ、<strong>誰でも読める接続マップ</strong>を整備します。
        </p>
        <table>
          <thead>
            <tr><th>device_id</th><th>tag</th><th>slave_id</th><th>register</th></tr>
          </thead>
          <tbody>
            <tr><td>JP-TYO-VILLA01-F2-AHU-01</td><td>SAT</td><td>1</td><td>40021</td></tr>
            <tr><td>JP-TYO-VILLA01-F2-AHU-01</td><td>RAT</td><td>1</td><td>40022</td></tr>
          </tbody>
        </table>

        <h3 class="section">4-5. Energy DB構造</h3>
        <p>
          すべての実測データは時系列DBとして次の4要素で保存します。
          これが設備診断・効率分析・LCC・CAPEX/OPEX判断の基盤になります。
        </p>
        <div class="band">
          <span class="code">timestamp / device_id / tag / value</span>
        </div>
        <table>
          <thead>
            <tr><th>timestamp</th><th>device_id</th><th>tag</th><th>value</th></tr>
          </thead>
          <tbody>
            <tr><td>2026-03-30 10:00</td><td>JP-TYO-VILLA01-AHU-01</td><td>SAT</td><td>16.2</td></tr>
            <tr><td>2026-03-30 10:00</td><td>JP-TYO-VILLA01-CH-01</td><td>PWR</td><td>23.5</td></tr>
          </tbody>
        </table>
      </section>

      <section class="card full">
        <h2>5. TORUS Data Layer Architecture</h2>
        <p>
          設備データを単なるポイント一覧ではなく、建物〜投資判断まで接続可能な階層構造として扱います。
        </p>
        <div class="layer-list">
          <div class="item"><strong>Layer 1｜Sensor</strong><br>温度・圧力・流量・電力などの生データ</div>
          <div class="item"><strong>Layer 2｜Device</strong><br>センサーや計測器を識別するデバイス単位</div>
          <div class="item"><strong>Layer 3｜Equipment</strong><br>AHU / 冷凍機 / ポンプ / 盤などの設備単位</div>
          <div class="item"><strong>Layer 4｜Building</strong><br>建物単位の運用・エネルギー評価・改修判断</div>
          <div class="item"><strong>Layer 5｜Portfolio</strong><br>複数建物横断の比較・投資判断・REIT / 公共施設群分析</div>
          <div class="item"><strong>Layer 6｜Energy</strong><br>設備効率、ランニングコスト、LCC、改善効果の可視化</div>
          <div class="item"><strong>Layer 7｜Control</strong><br>将来的には制御レイヤーまでオープン化し、BMSを「唯一のOS」から切り離す</div>
        </div>
      </section>

      <section class="card">
        <h2>6. なぜ今これが必要か</h2>
        <div class="benefit-list">
          <div class="item"><strong>建築ストック時代への適合</strong><br>新築中心ではなく、既存建物の継続改善が主戦場になっています。</div>
          <div class="item"><strong>エネルギー可視化の必然</strong><br>脱炭素・省エネ・LCC・ESG対応のため、実測データ基盤が必要です。</div>
          <div class="item"><strong>ベンダー依存の限界</strong><br>保有者・運営者側がデータ主権を持てない状態は、長期的に不利です。</div>
        </div>
      </section>

      <section class="card">
        <h2>7. 期待される効果</h2>
        <div class="benefit-list">
          <div class="item"><strong>設備ごとの効率改善</strong><br>AHU / ポンプ / 冷凍機などの運転実態を比較し、改善対象を明確化</div>
          <div class="item"><strong>投資判断の高度化</strong><br>更新・制御改修・省エネ施策の妥当性を時系列データで説明可能</div>
          <div class="item"><strong>複数物件横断の分析</strong><br>保有建物群・公共施設群・事業ポートフォリオの横比較が可能</div>
        </div>
      </section>

      <section class="card full">
        <h2>8. 導入アプローチ（現実的な進め方）</h2>
        <p>
          TORUSは、最初から巨大な統合システムとして導入する必要はありません。
          むしろ、既存建物の現場で使える最小構成から始める方が現実的です。
        </p>
        <div class="phase-list">
          <div class="item"><strong>Phase 1｜共通辞書の整備</strong><br>Device ID / Equipment Type Dictionary / Tag Dictionary / Point Map の標準化</div>
          <div class="item"><strong>Phase 2｜案件単位でのDB化</strong><br>設備台帳・通信点・資料リンク・レビュー用HTMLポータルの整備</div>
          <div class="item"><strong>Phase 3｜時系列データ蓄積</strong><br>実測値を時系列DBへ蓄積し、設備効率やエネルギー傾向を分析</div>
          <div class="item"><strong>Phase 4｜改善提案と投資判断</strong><br>更新優先度・制御改修・LCC・省エネ効果の提案へ展開</div>
          <div class="item"><strong>Phase 5｜制御レイヤー拡張</strong><br>将来的にはOpen Controlへ接続し、建物OSとして成熟させる</div>
        </div>
      </section>

      
      <section class="card full">
        <h2>8.5 Phase2｜Control Layerでできることと、獲得できる未来</h2>
        <p>
          現時点では、まず <strong>Phase1 = データ取得・設備DB化・効率診断</strong> を着実に積み上げることが先行します。
          その上で、十分な実測ログと診断結果が蓄積された後に、<strong>Phase2 = Control Layer</strong> へ進むことで、
          不動産保有者・公共施設運営者に対して「見える化の先に何が起きるのか」を具体的に提示できるようになります。
        </p>
        <div class="band section">
          <strong>重要な考え方</strong><br>
          いきなり制御を売るのではなく、<br>
          <span class="code">実測データ取得 → 設備効率診断 → 改善仮説の提示 → 限定的な制御実装</span><br>
          の順で進めることで、技術的にも運用面でもリスクを下げられます。
        </div>

        <h3 class="section">8.5-1. Control Layerとは何か</h3>
        <p>
          Control Layerとは、設備制御を特定BMSベンダーのブラックボックス内だけに閉じ込めず、
          <strong>設備ID・タグ・制御ルール・安全条件を共通構造で扱うための制御インターフェース</strong>です。
          つまり、中央監視そのものを作り直すというよりも、
          <strong>既存設備や既存BMSの上位に、オープンな制御OSを重ねる</strong>考え方です。
        </p>

        <h3 class="section">8.5-2. Control Layerでできること</h3>
        <table>
          <thead>
            <tr><th>分類</th><th>できること</th><th>具体例</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>運転最適化</td>
              <td>設備ごとの運転条件を実測に基づき調整</td>
              <td>AHUの送風量、ポンプの運転台数、冷凍機の優先順位を見直す</td>
            </tr>
            <tr>
              <td>時間制御</td>
              <td>曜日・時間帯・稼働状況に応じた自動運転</td>
              <td>営業時間外は設定値を緩和し、立上げ時のみ先行運転</td>
            </tr>
            <tr>
              <td>需要追従制御</td>
              <td>利用率や室内環境に応じた可変制御</td>
              <td>在室率・CO2・室温に応じて外気量や風量を段階制御</td>
            </tr>
            <tr>
              <td>エネルギー制御</td>
              <td>電力・ガス・熱源効率を踏まえた運転切替</td>
              <td>時間帯別料金や外気条件に応じて最も有利な運転モードへ切替</td>
            </tr>
            <tr>
              <td>異常回避</td>
              <td>しきい値・傾向監視に基づく予防制御</td>
              <td>差圧異常・温度異常・過負荷傾向を検知し、停止やアラートに先行介入</td>
            </tr>
            <tr>
              <td>複数設備連携</td>
              <td>設備単体でなく系統全体を見て制御</td>
              <td>冷凍機・冷却塔・ポンプを個別最適ではなく系統最適で制御</td>
            </tr>
          </tbody>
        </table>

        <h3 class="section">8.5-3. 具体的なユースケース</h3>
        <div class="phase-list">
          <div class="item"><strong>ユースケース1｜AHUの送風量最適化</strong><br>
            送風温度・還気温度・CO2・在室状況から、必要以上の風量を抑制。過剰送風を減らし、ファン動力を低減。
          </div>
          <div class="item"><strong>ユースケース2｜熱源・ポンプ系統の協調制御</strong><br>
            冷凍機効率、負荷率、冷水温度差、ポンプ電力を同時に見ながら、最も効率の良い組み合わせを選択。
          </div>
          <div class="item"><strong>ユースケース3｜公共施設の時間帯別最適運転</strong><br>
            利用が偏る施設では、全時間帯を同じ設定で回すのではなく、開館前・ピーク帯・閉館前後で制御を切替。
          </div>
          <div class="item"><strong>ユースケース4｜異常予兆に対する先回り制御</strong><br>
            温度差の崩れ、ポンプ電流の増加、弁開度の張り付き傾向から、故障前の兆候をつかみ、点検や設定補正へつなぐ。
          </div>
        </div>

        <h3 class="section">8.5-4. 不動産保有者・運営者が得られる未来</h3>
        <table>
          <thead>
            <tr><th>観点</th><th>現状</th><th>Control Layer導入後の未来</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>データ主権</td>
              <td>BMSベンダー依存で自由に使えない</td>
              <td>保有者側が設備データと制御方針を理解し、選択できる</td>
            </tr>
            <tr>
              <td>省エネ改善</td>
              <td>感覚・経験則・単発工事で終わりがち</td>
              <td>実測ログと診断結果を使って継続的に改善できる</td>
            </tr>
            <tr>
              <td>更新投資</td>
              <td>更新理由が曖昧で、比較検討しにくい</td>
              <td>どの設備に、どの順序で、どの制御を入れるべきか説明できる</td>
            </tr>
            <tr>
              <td>運用柔軟性</td>
              <td>設定変更のたびにベンダー依頼が必要</td>
              <td>契約に縛られず、建物ごとの運用思想を反映しやすい</td>
            </tr>
            <tr>
              <td>資産価値</td>
              <td>設備の実態が見えず、価値評価に反映しにくい</td>
              <td>運用データ・改善履歴・効率指標を資産説明力に変えられる</td>
            </tr>
          </tbody>
        </table>

        <h3 class="section">8.5-5. なぜPhase1の後にPhase2なのか</h3>
        <p>
          不動産保有者にとって、制御は魅力的ですが、同時に「本当に安全か」「どの程度効果があるか」という不安も大きい領域です。
          そのため、先にPhase1で <strong>データ取得・設備効率診断・改善余地の可視化</strong> を行い、
          その後にControl Layerで「どの設備に、どの制御を、どこまで入れると、どんな効果が見込めるか」を示す方が、
          合意形成しやすく、案件化しやすくなります。
        </p>
        <div class="quote">
          Phase1 は「建物の現状を正しく知る段階」。<br>
          Phase2 は「知った上で、運用を変えて成果を取りに行く段階」。
        </div>

        <h3 class="section">8.5-6. 実務上の導入イメージ</h3>
        <div class="phase-list">
          <div class="item"><strong>Step 1｜既存設備・既存BMSの把握</strong><br>どの設備に、どの通信点があり、どこまで取得できるか整理する。</div>
          <div class="item"><strong>Step 2｜設備DBと時系列ログの蓄積</strong><br>まずは制御せず、実態把握と診断に必要なログを一定期間収集する。</div>
          <div class="item"><strong>Step 3｜改善シナリオを複数提示</strong><br>送風量最適化、設定温度見直し、運転時間短縮など、リスクの低い制御案から提示する。</div>
          <div class="item"><strong>Step 4｜限定範囲での制御実装</strong><br>1系統、1設備群、1時間帯など小さく始め、効果検証しながら拡張する。</div>
          <div class="item"><strong>Step 5｜建物全体最適へ展開</strong><br>部分最適の成功事例を横展開し、保有建物群や公共施設群へ広げていく。</div>
        </div>

        <h3 class="section">8.5-7. この段階で伝えたいメッセージ</h3>
        <p>
          TORUSのControl Layerは、「最初からすべてを自動制御します」という話ではありません。
          まずは建物の実態をデータで掴み、その上で
          <strong>安全性・説明性・効果検証性の高い制御から順に導入できる未来</strong>
          を用意することに意味があります。
        </p>
        <p>
          Phase1の目的は、この取り組み自体をすぐにマネタイズすることではありません。
          まずは実践を積み上げ、建物ごとの設備データを丁寧に収集し、
          建築ストックの現状を可視化できる基盤をつくることを重視します。
          この段階の原資は、通常のMEP設計・省エネ申請・MEP施工など既存業務の収益から充当し、
          出資や先行回収を前提とせずに進める考え方です。
        </p>
        <p>
          その上でPhase2に進むと、「見える化の次に、どのような制御を入れれば建物がどう良くなるのか」を
          実測と診断結果に基づいて提示できるようになります。
          重要なのは事業拡大そのものではなく、
          <strong>建築ストックをより良質にする分岐点を現実に生み出せるかどうか</strong>
          にあります。
        </p>
      </section>


      <section class="card">
        <h2>9. この構想に賛同いただきたい理由</h2>
        <p>
          本構想は、特定ベンダーの商流を壊すためのものではなく、
          建物保有者・公共施設運営者・設備設計者・施工者・ネットワーク事業者が
          <strong>同じデータ基盤の上で建物価値を継続的に高める</strong>ための共通基盤づくりです。
        </p>
      </section>

      <section class="card">
        <h2>10. 初期成果物イメージ</h2>
        <p>まずは次の3ファイルから着手できます。CSVでもDBでも同じ構造で扱えます。</p>
        <table>
          <thead>
            <tr><th>ファイル名</th><th>内容</th></tr>
          </thead>
          <tbody>
            <tr><td>torus_device_master.csv</td><td>設備台帳 / Device ID / 設備タイプ / エリア情報</td></tr>
            <tr><td>torus_point_map.csv</td><td>通信点マップ / device_id と tag と register の対応</td></tr>
            <tr><td>torus_tag_dictionary.csv</td><td>タグ辞書 / 名称 / 単位 / 説明 / 適用設備種別</td></tr>
          </tbody>
        </table>
      </section>

      <section class="card full">
        <h2>11. 最後に</h2>
        <p>
          いま必要なのは、建物のデータを「あるが使えないもの」から、
          「誰が見ても意味が分かり、改善と投資判断に繋がるもの」へ変えることです。
          TORUSは、そのための共通言語・共通構造・共通DBを整備する取り組みです。
        </p>
        <p>
          建物設備の世界におけるブラックボックスを減らし、
          建築ストックの運用改善とエネルギーDB構築を前進させるために、
          実務起点で、一歩ずつオープン化を進めていきます。
        </p>
      </section>
    </div>

    <div class="footer">
      TORUS Open Building Data OS 構想書 v0.1 / HTML共有用ドラフト
    </div>
  </div>
</body>
