    <!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電気設備診断 実務ページ</title><style>
:root{
  --navy:#0f2744; --blue:#1b5fa7; --line:#d8e1eb; --bg:#f4f7fb; --card:#ffffff;
  --text:#172334; --muted:#5c6a7c; --soft:#edf4ff; --ok:#edf8f0; --warn:#fff7ea;

}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;line-height:1.78}

.hero{background:linear-gradient(135deg,#10233d 0%, #143b6b 100%);color:#fff;padding:52px 0 38px}

.hero p{margin:0;color:rgba(255,255,255,.92);max-width:980px;font-size:17px}
.badge{display:inline-block;padding:5px 10px;border:1px solid rgba(255,255,255,.22);border-radius:999px;margin-bottom:14px;font-size:12px;letter-spacing:.08em}
nav.topnav{position:sticky;top:0;z-index:20;background:rgba(244,247,251,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav-inner{width:min(var(--max),calc(100% - 32px));margin:0 auto;display:flex;flex-wrap:wrap;gap:8px;padding:10px 0}

main{padding:24px 0 56px}
.section{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;margin:0 0 22px}
h2{margin:0 0 14px;font-size:clamp(24px,3vw,34px);color:var(--navy)}
h3{margin:0 0 8px;font-size:19px;color:var(--navy)}
h4{margin:0 0 8px;font-size:16px;color:var(--navy)}
p{margin:0 0 12px}.small{font-size:13px;color:var(--muted)}
.grid-2,.grid-3,.grid-4{display:grid;gap:14px}
.grid-2{grid-template-columns:repeat(2,1fr)} .grid-3{grid-template-columns:repeat(3,1fr)} .grid-4{grid-template-columns:repeat(4,1fr)}
.card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:16px}
.band{background:var(--soft);border:1px solid #d7e6ff;border-radius:14px;padding:14px 16px}
.ok{background:var(--ok);border:1px solid #cce2d2;border-radius:14px;padding:14px 16px}
.warn{background:var(--warn);border:1px solid #f0d8a6;border-radius:14px;padding:14px 16px}
.tags{margin-top:8px}
.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 9px;margin:3px 6px 0 0;background:#fff;color:var(--navy);font-size:12px}
.flow{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:12px}
.step{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px 10px;min-height:86px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px}
table{width:100%;border-collapse:collapse;margin-top:10px;background:#fff;font-size:14px}
th,td{border:1px solid var(--line);padding:10px 11px;text-align:left;vertical-align:top}
th{background:#eef3f8;color:var(--navy);font-weight:700}
ul{margin:10px 0 0 18px;padding:0} li{margin:4px 0}
.footer{padding:0 0 44px;color:var(--muted);font-size:13px}
.cta{display:inline-block;padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--navy);font-weight:700}
.cta.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
@media(max-width:980px){.grid-2,.grid-3,.grid-4,.flow{grid-template-columns:1fr}.hero{padding:42px 0 32px}.section{padding:20px 18px}}
